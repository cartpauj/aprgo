{{define "map.html"}}{{template "header" .}}
<link rel="stylesheet" href="/static/leaflet.css">
<script src="/static/leaflet.js" defer></script>
<script src="/static/aprs-icons.js" defer></script>
<script src="/static/js/map.js" defer></script>
<section class="map-page">
  <div class="map-controls">
    <h1>Map</h1>
    <label>Window
      <select id="window-min">
        {{range .WindowOptions}}
        <option value="{{.Value}}" {{if eq $.DefaultWindow .Value}}selected{{end}}>{{.Label}}</option>
        {{end}}
      </select>
    </label>
    <label class="map-search-label">Search
      <input type="text" id="map-search" placeholder="LY*, KG7*, -W* (comma-sep, * wildcard, -exclude)" autocomplete="off">
    </label>
    <span id="map-status" class="map-status">initializing…</span>
    <button type="button" id="focus-pill" class="focus-pill" style="display:none;" aria-label="Show all stations">
      <span class="focus-pill-label">Viewing</span>
      <span class="focus-pill-call" id="focus-pill-call"></span>
      <span class="focus-pill-x" aria-hidden="true">×</span>
    </button>
    <button type="button" id="map-filters-toggle" class="btn ghost map-filters-toggle" aria-expanded="false" aria-controls="map-filters-panel">
      🔧 Filters <span id="map-filters-count" class="dim"></span>
    </button>
  </div>
  <fieldset class="map-cats" id="map-filters-panel" data-collapsed="true">
    <legend>Show categories</legend>
    <label><input type="checkbox" class="map-cat" value="vehicle" checked>{{aprsIcon "/>"}} Vehicles</label>
    <label><input type="checkbox" class="map-cat" value="fixed" checked>{{aprsIcon "/-"}} Fixed</label>
    <label><input type="checkbox" class="map-cat" value="wx" checked>{{aprsIcon "/_"}} Weather</label>
    <label><input type="checkbox" class="map-cat" value="aircraft" checked>{{aprsIcon "/^"}} Aircraft</label>
    <label><input type="checkbox" class="map-cat" value="digi" checked>{{aprsIcon "I&"}} Digi/IGate</label>
    <label><input type="checkbox" class="map-cat" value="marine" checked>{{aprsIcon "/Y"}} Marine</label>
    <label><input type="checkbox" class="map-cat" value="person" checked>{{aprsIcon "/["}} Person/HT</label>
    <label><input type="checkbox" class="map-cat" value="balloon" checked>{{aprsIcon "/O"}} Balloon</label>
    <label><input type="checkbox" class="map-cat" value="other" checked>{{aprsIcon "/."}} Other</label>
  </fieldset>
  <div id="map" class="leaflet-map"
       data-my-lat="{{.St.Lat}}"
       data-my-lon="{{.St.Lon}}"
       data-my-call="{{.St.Callsign}}"
       data-my-symbol="{{.MySymbol}}"
       data-my-comment="{{.MyComment}}"
       {{if .FilterKm}}data-filter-lat="{{.FilterLat}}" data-filter-lon="{{.FilterLon}}" data-filter-km="{{.FilterKm}}"{{end}}></div>
</section>
{{template "footer" .}}{{end}}
