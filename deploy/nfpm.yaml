# nfpm config — produces .deb and .rpm packages for aprgo.
#
# CI (.github/workflows/release.yml) exports three env vars before running:
#
#   VERSION    — e.g. "1.0.0" (git tag minus the leading "v")
#   ARCH       — Debian arch name: amd64, arm64, armhf, i386
#                For ARMv6 (Pi Zero / Pi 1) we ship a SECOND armhf .deb with
#                a custom filename suffix — the workflow controls the
#                output name via `--target <path>`, since nfpm's filename
#                isn't templatable in the config.
#   GO_BINARY  — path to the pre-built static aprgo binary for that arch
#
# nfpm natively expands ${VAR} in most top-level fields. For contents[] entries
# we have to set `expand: true` per entry — without it, the literal ${...}
# survives into the package and the glob fails.
#
# Run as:
#   nfpm package --packager deb --target <out-path-or-dir> --config deploy/nfpm.yaml
#   nfpm package --packager rpm --target <out-path-or-dir> --config deploy/nfpm.yaml

name: aprgo
arch: ${ARCH}
platform: linux
version: ${VERSION}
# RPM-only: the packaging-iteration counter. RPM filenames embed this as
# `aprgo-<version>-<release>.<arch>.rpm`. Convention is to start at 1
# and bump if you re-cut a package without bumping the upstream version.
# Pinned here so get.sh can construct deterministic download URLs.
release: "1"
section: hamradio
priority: optional
maintainer: cartpauj <cartpauj@caseproof.com>
description: |
  APRS iGate, digipeater, and operator web console in a single Go binary.
  One process owns the TNC, talks to APRS-IS, makes gating decisions,
  runs beacons, and serves the operator console — no separate daemon,
  no log tailing, no IPC. Supports KISS TNCs over serial, Bluetooth,
  or TCP.
homepage: https://github.com/cartpauj/aprgo
license: MIT

# Soft dependencies. The aprgo binary itself is fully static (no shared-lib
# deps), so nothing is strictly Required. Bluez is needed only for
# Bluetooth TNCs; direwolf only for soundcard setups. apt + dnf both
# honor Recommends by default unless the operator opted out.
recommends:
  - bluez
  - bluez-tools
  - direwolf

# Modern unified path. /usr/lib/systemd/system is the upstream-systemd
# location, used by Fedora and by Debian 12+ / Ubuntu 22.04+ (where
# /lib/systemd/system is a usrmerge symlink). One path serves both
# package formats.
contents:
  - src: ${GO_BINARY}
    dst: /usr/bin/aprgo
    expand: true
    file_info:
      mode: 0755
      owner: root
      group: root

  - src: deploy/aprgo.service
    dst: /usr/lib/systemd/system/aprgo.service
    file_info:
      mode: 0644
      owner: root
      group: root

scripts:
  postinstall: deploy/postinst.sh
  preremove:   deploy/prerm.sh
  postremove:  deploy/postrm.sh
